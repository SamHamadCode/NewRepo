<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MonitorBot Harvester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { width: 320px; background: #0f0f1a; color: #e2e8f0; }

    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px; background: #1a1a2e;
      border-bottom: 1px solid #2d2d4e;
    }
    .logo { width: 28px; height: 28px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .header span { font-size: 11px; color: #6b7280; }

    .section { padding: 14px 16px; border-bottom: 1px solid #1e1e36; }
    .label { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }

    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .row:last-child { margin-bottom: 0; }

    .field-label { font-size: 13px; color: #cbd5e1; }
    .field-value { font-size: 13px; color: #94a3b8; }

    input[type=number] {
      width: 70px; background: #1e1e36; border: 1px solid #2d2d4e; color: #e2e8f0;
      padding: 5px 8px; border-radius: 6px; font-size: 13px; text-align: center;
    }
    input[type=number]:focus { outline: none; border-color: #3b82f6; }

    .btn {
      width: 100%; padding: 9px 0; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s;
      margin-bottom: 6px;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:hover { opacity: .85; }
    .btn:active { opacity: .7; }
    .btn-red    { background: #ef4444; color: #fff; }
    .btn-blue   { background: #3b82f6; color: #fff; }
    .btn-green  { background: #22c55e; color: #fff; }
    .btn-gray   { background: #374151; color: #e2e8f0; }

    .status-row { display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: #22c55e; }
    .dot-gray  { background: #6b7280; }

    .count-box {
      background: #1e1e36; border-radius: 8px; padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 8px;
    }
    .count-label { font-size: 12px; color: #6b7280; }
    .count-value { font-size: 20px; font-weight: 700; color: #22c55e; }

    .footer { padding: 10px 16px; font-size: 11px; color: #4b5563; text-align: center; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">??</div>
  <div>
    <h1>MonitorBot Harvester</h1>
    <span>Cookie &amp; Token Harvester</span>
  </div>
</div>

<!-- Status -->
<div class="section">
  <div class="label">Status</div>
  <div class="status-row">
    <div class="dot" id="statusDot"></div>
    <span id="statusText" style="font-size:13px;"></span>
  </div>
  <div class="count-box">
    <div>
      <div class="count-label">Cookies Ready</div>
      <div class="count-value" id="harvestCount">0</div>
    </div>
    <div style="text-align:right">
      <div class="count-label">Bearer Token</div>
      <div style="font-size:13px;font-weight:600;" id="bearerStatus">—</div>
    </div>
  </div>
</div>

<!-- Settings -->
<div class="section">
  <div class="label">Settings</div>
  <div class="row">
    <span class="field-label">Harvests Per Page Load</span>
    <input type="number" id="harvestsPerLoad" min="1" max="10" value="1">
  </div>
  <div class="row">
    <span class="field-label">Data Expiration (Minutes)</span>
    <input type="number" id="dataExpiry" min="1" max="60" value="3">
  </div>
</div>

<!-- Actions -->
<div class="section">
  <div class="label">Actions</div>
  <button class="btn btn-red" id="btnClear">Clear Harvested Data</button>
  <button class="btn btn-blue" id="btnCookieOrder"></button>
  <button class="btn" id="btnHarvesting"></button>
  <button class="btn btn-gray" id="btnHarvestNow">Harvest Current Tab Now</button>
</div>

<div class="footer">MonitorBot v1.0 · localhost:52384</div>

<script src="popup.js"></script>
</body>
</html>
